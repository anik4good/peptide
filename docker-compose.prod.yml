version: "3.9"

services:
  peptide-analytica:
    image: anik4good/bangladesh_geocode:latest
    container_name: peptide-analytica
    restart: unless-stopped
    ports:
      - "8012:3000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.peptide-analytica.description: "Peptide Analytica v3 - Scientific peptide reference database"
      com.peptide-analytica.version: "3.0.0"
